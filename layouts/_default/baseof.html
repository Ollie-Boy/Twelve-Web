<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .Title }}{{ .Title }} | {{ end }}{{ .Site.Title }}</title>
  <meta name="description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ .Site.Params.heroDescription }}{{ end }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Text:wght@400;500&family=Google+Sans:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ "css/site.css" | relURL }}">
</head>
<body>
  {{ block "main" . }}{{ end }}
  <script defer src="{{ "js/site.js" | relURL }}"></script>
</body>
</html>
